# ═══════════════════════════════════════════════════════════
# CATSHY Nginx Configuration — HTTPS + Security Headers
# ═══════════════════════════════════════════════════════════
#
# SETUP INSTRUCTIONS:
#
# Option A — Self-signed cert (dev/internal):
#   sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /etc/ssl/private/catshy.key \
#     -out /etc/ssl/certs/catshy.crt \
#     -subj "/CN=catshy.local"
#
# Option B — Let's Encrypt (production):
#   sudo certbot --nginx -d your-domain.com
#   (Certbot will auto-configure the ssl directives)
#
# Option C — Docker with Traefik:
#   See docker-compose.yml for built-in HTTPS via Traefik labels.
# ═══════════════════════════════════════════════════════════

# Rate limiting zone (add to /etc/nginx/nginx.conf inside http {})
# limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
# limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/s;

# HTTP → HTTPS redirect
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ── TLS Certificates ──
    # Update paths to match your cert location
    ssl_certificate     /etc/ssl/certs/catshy.crt;
    ssl_certificate_key /etc/ssl/private/catshy.key;

    # ── TLS Configuration ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;  # Deprecated; CSP is the replacement
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' wss: ws:; frame-ancestors 'self';" always;

    # ── Frontend static files ──
    root /opt/catshy/frontend/dist;
    index index.html;

    # ── API proxy ──
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Pass cookies
        proxy_set_header Cookie $http_cookie;

        # Rate limiting for API
        limit_req zone=api burst=20 nodelay;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Stricter rate limit for auth endpoints
    location /api/auth/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        limit_req zone=auth burst=5 nodelay;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Report downloads
    location /reports/ {
        alias /opt/catshy/reports/;
        internal;
    }
}
