version: "3.9"

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catshy
      POSTGRES_USER: catshy
      POSTGRES_PASSWORD: catshy_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catshy"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── CATSHY API ──
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://catshy:catshy_secret@postgres:5432/catshy
      DATABASE_URL_SYNC: postgresql://catshy:catshy_secret@postgres:5432/catshy
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-openssl-rand-hex-64}
      TOKEN_SECRET: ${TOKEN_SECRET:-change-me-use-openssl-rand-hex-64}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@catshy.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-AdminPass123!}
      CORS_EXTRA_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker ──
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://catshy:catshy_secret@postgres:5432/catshy
      DATABASE_URL_SYNC: postgresql://catshy:catshy_secret@postgres:5432/catshy
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Beat (scheduler) ──
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://catshy:catshy_secret@postgres:5432/catshy
      DATABASE_URL_SYNC: postgresql://catshy:catshy_secret@postgres:5432/catshy
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (Nginx) ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
